<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mekyaner | Administration</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #0288d1; --dark: #263238; --bg: #eceff1; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        
        /* OVERLAY CONNEXION */
        #loginOverlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }

        /* ENTÊTE BLEU AVEC LOGO */
        header { 
            background: var(--primary); 
            color: #fff; 
            padding: 20px 15px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .logo-admin {
            max-width: 300px;
            height: auto;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        header strong { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .img-preview { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; margin-right: 15px; }
        .btn-del { color: #d32f2f; background: none; border: 1px solid #d32f2f; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-top:0; color:var(--primary)">Accès Admin</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button class="btn-add" onclick="handleLogin()">Se connecter</button>
    </div>
</div>

<header>
    <img src="https://i.ibb.co/CxcghLq/Background-Eraser-20250525-183236550.png" alt="Mekyaner" class="logo-admin" onerror="this.style.display='none'">
    <strong>Administration Mekyaner</strong>
    <div style="margin-top:10px;">
        <button onclick="firebase.auth().signOut()" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:5px 15px; border-radius:20px; cursor:pointer; font-size:12px;">Déconnexion</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <h3 style="margin-top:0">📦 Ajouter un article</h3>
        <input id="pName" type="text" placeholder="Nom du produit">
        <input id="pPrice" type="number" placeholder="Prix (FCFA)">
        <input id="pImg" type="text" placeholder="URL de l'image (Lien direct)">
        <button class="btn-add" onclick="addProduct()">Publier sur la boutique</button>
    </div>

    <div class="card">
        <h3 style="margin-top:0">📋 Articles en ligne</h3>
        <div id="adminList"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD5s2cQ68QqoG7vbPGW0lo_M0htpBF12FM",
    authDomain: "mekyaner-ad755.firebaseapp.com",
    projectId: "mekyaner-ad755",
    storageBucket: "mekyaner-ad755.firebasestorage.app",
    messagingSenderId: "593398207908",
    appId: "1:593398207908:web:f69a13a9bc5a6079819d31"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(user => { 
    document.getElementById('loginOverlay').style.display = user ? 'none' : 'flex'; 
    if(user) loadData(); 
});

async function handleLogin() { 
    const e = document.getElementById('email').value; 
    const p = document.getElementById('pass').value; 
    try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Identifiants incorrects"); } 
}

async function addProduct() {
    const name = document.getElementById('pName').value;
    const price = parseInt(document.getElementById('pPrice').value);
    const img = document.getElementById('pImg').value;

    if(name && price && img) {
        await db.collection("products").add({ 
            name, price, img, createdAt: firebase.firestore.FieldValue.serverTimestamp() 
        });
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pImg').value = '';
        alert("Produit ajouté !");
    }
}

function loadData() {
    db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
        const list = document.getElementById('adminList');
        list.innerHTML = '';
        snap.forEach(doc => {
            const p = doc.data();
            list.innerHTML += `
            <div class="list-item">
                <div style="display:flex; align-items:center;">
                    <img src="${p.img}" class="img-preview" onerror="this.src='https://via.placeholder.com/50'">
                    <div>
                        <strong>${p.name}</strong><br>
                        <span style="color:var(--primary)">${p.price.toLocaleString()} FCFA</span>
                    </div>
                </div>
                <button class="btn-del" onclick="deleteItem('${doc.id}')">Supprimer</button>
            </div>`;
        });
    });
}

async function deleteItem(id) {
    if(confirm("Supprimer cet article ?")) {
        await db.collection("products").doc(id).delete();
    }
}
</script>
</body>
</html>
