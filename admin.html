<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mekyaner | Dashboard Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #0288d1; --dark: #263238; --bg: #f0f2f5; --success: #2e7d32; --danger: #d32f2f; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--dark); }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 3000; }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }

        header { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-admin { width: 300px; height: 70px; border-radius: 50%; border: 2px solid white; background: white; margin-bottom: 10px; object-fit: cover; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .container { grid-template-columns: 1fr 2fr; } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; grid-column: 1 / -1; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--primary); }

        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; width: auto; font-size: 11px; padding: 5px 10px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .badge-city { background: #e3f2fd; color: var(--primary); padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="color:var(--primary); margin-bottom:5px;">MEKYANER</h2>
        <p>Administration</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button class="btn btn-add" onclick="handleLogin()">Se connecter</button>
    </div>
</div>

<header>
    <img src="https://i.ibb.co/CxcghLq/Background-Eraser-20250525-183236550.png" alt="Logo" class="logo-admin">
    <div style="font-weight: 800; letter-spacing: 1px;">DASHBOARD ADMIN</div>
    <button onclick="firebase.auth().signOut()" style="background:none; border:1px solid white; color:white; margin-top:10px; cursor:pointer; padding:2px 10px; border-radius:5px; font-size:11px;">Déconnexion</button>
</header>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-val" id="statVisits">0</div>
            <small>Visiteurs</small>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statOrders">0</div>
            <small>Ventes</small>
        </div>
        <div class="stat-card" style="grid-column: 1 / -1;">
            <div class="stat-val" id="statRev" style="color:var(--success)">0 F</div>
            <small>Chiffre d'Affaires Total</small>
        </div>
    </div>

    <div class="card">
        <h3>➕ Nouvel Article</h3>
        <input id="pName" type="text" placeholder="Nom de l'article">
        <input id="pPrice" type="number" placeholder="Prix (F)">
        <input id="pImg" type="text" placeholder="Lien direct ImgBB">
        <button class="btn btn-add" onclick="addProduct()">Publier</button>
    </div>

    <div class="card">
        <h3>
            📋 Historique
            <button class="btn btn-danger" onclick="clearAllOrders()">Vider tout</button>
        </h3>
        <div id="orderList">Chargement...</div>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
        <h3>📦 Articles en ligne</h3>
        <div id="adminList"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD5s2cQ68QqoG7vbPGW0lo_M0htpBF12FM",
    authDomain: "mekyaner-ad755.firebaseapp.com",
    projectId: "mekyaner-ad755",
    storageBucket: "mekyaner-ad755.firebasestorage.app",
    messagingSenderId: "593398207908",
    appId: "1:593398207908:web:f69a13a9bc5a6079819d31"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(user => { 
    document.getElementById('loginOverlay').style.display = user ? 'none' : 'flex'; 
    if(user) { loadProducts(); loadOrders(); loadStats(); } 
});

async function handleLogin() { 
    const e = document.getElementById('email').value; 
    const p = document.getElementById('pass').value; 
    try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Accès refusé"); } 
}

// STATS VISITEURS
function loadStats() {
    db.collection("stats").doc("visitors").onSnapshot(doc => {
        if(doc.exists) document.getElementById('statVisits').innerText = doc.data().count || 0;
    });
}

// GESTION PRODUITS
async function addProduct() {
    const name = document.getElementById('pName').value;
    const price = parseInt(document.getElementById('pPrice').value);
    const img = document.getElementById('pImg').value;
    if(name && price && img) {
        await db.collection("products").add({ name, price, img, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Article ajouté !");
        document.getElementById('pName').value = ''; document.getElementById('pPrice').value = ''; document.getElementById('pImg').value = '';
    }
}

function loadProducts() {
    db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
        const list = document.getElementById('adminList');
        list.innerHTML = '';
        snap.forEach(doc => {
            const p = doc.data();
            list.innerHTML += `<div class="item-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${p.img}" style="width:40px; height:40px; border-radius:5px; object-fit:cover;">
                    <div><b>${p.name}</b><br><small>${p.price.toLocaleString()} F</small></div>
                </div>
                <button onclick="deleteProduct('${doc.id}')" style="background:none; border:none; color:red; cursor:pointer;">Supprimer</button>
            </div>`;
        });
    });
}

async function deleteProduct(id) { if(confirm("Supprimer cet article ?")) await db.collection("products").doc(id).delete(); }

// GESTION COMMANDES
function loadOrders() {
    db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snap => {
        const list = document.getElementById('orderList');
        let total = 0; let count = 0;
        list.innerHTML = '';
        snap.forEach(doc => {
            const o = doc.data();
            total += o.totalPrice || 0; count++;
            list.innerHTML += `<div class="item-row" style="background:#f9f9f9; padding:10px; margin-bottom:8px; border-radius:8px;">
                <div style="flex:1">
                    <span class="badge-city">${o.customerCity || 'N/A'}</span><br>
                    <b style="color:var(--primary)">${o.productName}</b><br>
                    <small>${o.customerName} - ${o.customerPhone}</small>
                </div>
                <div style="text-align:right">
                    <b>${(o.totalPrice || 0).toLocaleString()} F</b><br>
                    <button onclick="deleteOrder('${doc.id}')" style="background:none; border:none; color:red; font-size:10px; cursor:pointer;">Supprimer</button>
                </div>
            </div>`;
        });
        document.getElementById('statRev').innerText = total.toLocaleString() + " F";
        document.getElementById('statOrders').innerText = count;
    });
}

async function deleteOrder(id) { if(confirm("Supprimer cette commande ?")) await db.collection("orders").doc(id).delete(); }

async function clearAllOrders() {
    if(confirm("EFFACER TOUT L'HISTORIQUE ?")) {
        const snap = await db.collection("orders").get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
    }
}
</script>
</body>
</html>
