<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mekyaner | Boutique Officielle</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #0288d1; --dark: #1a1a1a; --accent: #ffd700; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f8f9fa; color: var(--dark); padding-bottom: 60px; }
        
        header { 
            background: var(--primary); 
            color: white; 
            padding: 30px 15px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
        }
        .logo-container img {
            width: 300px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            background: white;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .brand-name { font-size: 26px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin: 5px 0; }
        .slogan { font-size: 13px; opacity: 0.9; font-style: italic; }

        .container { max-width: 1100px; margin: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        @media (max-width: 480px) { .container { grid-template-columns: 1fr 1fr; gap: 10px; } }

        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .product-info { padding: 12px; text-align: center; }
        .product-name { font-size: 14px; font-weight: 600; margin: 5px 0; height: 35px; overflow: hidden; }
        .product-price { color: var(--primary); font-weight: 800; font-size: 17px; margin-bottom: 10px; }
        
        .btn-buy { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-buy:active { transform: scale(0.95); }

        #orderModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; }
        .modal-content input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; }
        .modal-content input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/CxcghLq/Background-Eraser-20250525-183236550.png" alt="Logo Mekyaner">
    </div>
    <div class="brand-name">MEKYANER</div>
    <div class="slogan">Votre plate-forme de vente en ligne au Tchad</div</header>

<div class="container" id="productGrid"></div>

<div id="orderModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom:5px;">Article</h3>
        <p id="modalPrice" style="font-size:20px; font-weight:bold; color:var(--primary); margin-top:0;"></p>
        
        <input type="text" id="custName" placeholder="Ton Nom Complet">
        <input type="tel" id="custPhone" placeholder="Ton Numéro WhatsApp">
        <input type="text" id="custCity" placeholder="Ta Ville (ex: N'Djamena)">
        
        <button class="btn-buy" onclick="confirmOrder()" style="margin-top:15px; font-size:16px;">🔥 Confirmer la commande</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">Fermer</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD5s2cQ68QqoG7vbPGW0lo_M0htpBF12FM",
    authDomain: "mekyaner-ad755.firebaseapp.com",
    projectId: "mekyaner-ad755",
    storageBucket: "mekyaner-ad755.firebasestorage.app",
    messagingSenderId: "593398207908",
    appId: "1:593398207908:web:f69a13a9bc5a6079819d31"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let selectedProduct = null;

db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    snap.forEach(doc => {
        const p = doc.data();
        grid.innerHTML += `
        <div class="product-card">
            <img src="${p.img}" class="product-img" alt="${p.name}">
            <div class="product-info">
                <p class="product-name">${p.name}</p>
                <p class="product-price">${p.price.toLocaleString()} F</p>
                <button class="btn-buy" onclick="openOrderModal('${p.name}', ${p.price})">Acheter</button>
            </div>
        </div>`;
    });
});

function openOrderModal(name, price) {
    selectedProduct = { name, price };
    document.getElementById('modalTitle').innerText = name;
    document.getElementById('modalPrice').innerText = price.toLocaleString() + " FCFA";
    document.getElementById('orderModal').style.display = 'flex';
}

function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

async function confirmOrder() {
    const name = document.getElementById('custName').value;
    const phone = document.getElementById('custPhone').value;
    const city = document.getElementById('custCity').value;

    if(!name || !phone || !city) { alert("Remplis toutes tes infos !"); return; }

    try {
        await db.collection("orders").add({
            customerName: name,
            customerPhone: phone,
            customerCity: city,
            productName: selectedProduct.name,
            totalPrice: selectedProduct.price,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        // REMPLACE LE NUMÉRO CI-DESSOUS PAR TON NUMÉRO (235...)
        const monNumero = "23586752575"; 
        const texte = `Salut MEKYANER ! Je suis ${name} à ${city}. Je viens de commander : ${selectedProduct.name} (${selectedProduct.price} F). Contactez-moi au ${phone}.`;
        const waUrl = `https://wa.me/${monNumero}?text=${encodeURIComponent(texte)}`;

        alert("Commande enregistrée !");
        window.location.href = waUrl;
    } catch (e) { alert("Erreur reseau."); }
}
</script>
</body>
</html>
